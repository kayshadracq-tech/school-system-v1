<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard</title>

  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/teacher.css">
</head>

<body>

<div class="topbar">
  <h2>🎓 Teacher Panel</h2>
  <button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="loginBox">
  <h3>Teacher Login</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn">Login</button>
  <p id="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h3>Welcome: <span id="teacherName"></span></h3>
  <h4>Subject: <span id="subject"></span></h4>

  <div class="formCard">
    <input id="studentId" placeholder="Student ID">
    <input id="term" placeholder="Term">
    <input id="mark" placeholder="Mark">
    <button id="saveBtn">Save Mark</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Student ID</th>
        <th>Subject</th>
        <th>Term</th>
        <th>Mark</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>


  <script type="module">


    
   import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection,
  query,
  where,
  getDocs,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebaseapp.com",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= UI ================= */
const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");

let currentUser = null;
let teacherSubject = "";

/* ================= SIMPLE UI FUNCTIONS ================= */
function showLogin() {
  loginBox.style.display = "block";
  dashboard.style.display = "none";
}

function showDashboard() {
  loginBox.style.display = "none";
  dashboard.style.display = "block";
}

/* ================= LOGIN ================= */
document.getElementById("loginBtn").onclick = async () => {

  document.getElementById("error").innerText = "";

  try {

    await signInWithEmailAndPassword(
      auth,
      document.getElementById("email").value.trim(),
      document.getElementById("password").value.trim()
    );

  } catch (e) {

    document.getElementById("error").innerText =
      "Invalid email or password";
  }
};

/* ================= AUTH + ROUTING FIX ================= */
onAuthStateChanged(auth, async (user) => {

  // NOT LOGGED IN
  if (!user) {
    showLogin();
    return;
  }

  currentUser = user;

  try {

    // GET TEACHER RECORD
    const snap = await getDoc(doc(db, "teachers", user.uid));

    // NOT FOUND → LOG OUT SILENTLY
    if (!snap.exists()) {
      await signOut(auth);
      showLogin();
      return;
    }

    const data = snap.data();

    // ROLE CHECK
    if (data.role !== "teacher") {
      await signOut(auth);
      showLogin();
      return;
    }

    // SUCCESS → SHOW DASHBOARD
    teacherSubject = data.subject || "";

    document.getElementById("teacherName").innerText =
      data.name || user.email;

    document.getElementById("subject").innerText =
      teacherSubject;

    showDashboard();

    loadMarks();

  } catch (err) {
    console.error(err);
    await signOut(auth);
    showLogin();
  }
});

/* ================= SAVE MARK ================= */
document.getElementById("saveBtn").onclick = async () => {

  const studentId = document.getElementById("studentId").value.trim();
  const term = document.getElementById("term").value.trim();
  const mark = document.getElementById("mark").value.trim();

  if (!studentId || !term || !mark) {
    return alert("Fill all fields");
  }

  try {

await addDoc(collection(db, "marks"), {
  teacherId: currentUser.uid,
  teacherName: document.getElementById("teacherName").innerText,
  subject: teacherSubject,
  studentId,
  term,
  mark,

  createdAt: serverTimestamp()
});

    loadMarks();

  } catch (err) {
    alert("Failed to save mark");
  }
};

/* ================= LOAD MARKS ================= */
async function loadMarks() {

  const q = query(
    collection(db, "marks"),
    where("teacherId", "==", currentUser.uid)
  );

  const snap = await getDocs(q);

  const table = document.getElementById("table");
  table.innerHTML = "";

  snap.forEach((docSnap) => {

    const m = docSnap.data();

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${m.studentId}</td>
      <td>${m.subject}</td>
      <td>${m.term}</td>
      <td>${m.mark}</td>
      <td></td>
    `;

    const del = document.createElement("button");
    del.textContent = "Delete";
    del.className = "delete";

    del.onclick = async () => {
      await deleteDoc(doc(db, "marks", docSnap.id));
      loadMarks();
    };

    row.children[4].appendChild(del);

    table.appendChild(row);
  });
}

/* ================= LOGOUT ================= */
window.logout = async () => {
  await signOut(auth);
  location.reload();
}; 
      
</script>
</body>
</html>
