<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard</title>

  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/teacher.css">
</head>

<body>

<div class="topbar">
  <h2>🎓 Teacher Panel</h2>
  <button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="loginBox">
  <h3>Teacher Login</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn">Login</button>
  <p id="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h3>Welcome: <span id="teacherName"></span></h3>
  <h4>Subject: <span id="subject"></span></h4>

  <div class="formCard">
    <input id="studentId" placeholder="Student ID">
    <input id="term" placeholder="Term">
    <input id="mark" placeholder="Mark">
    <button id="saveBtn">Save Mark</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Student ID</th>
        <th>Subject</th>
        <th>Term</th>
        <th>Mark</th>
      </tr>
    </thead>

    <tbody id="table"></tbody>
  </table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG (SAME AS ADMIN) */
const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");

const email = document.getElementById("email");
const password = document.getElementById("password");

let currentUser = null;
let teacherSubject = "";

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value.trim()
    );
  } catch (e) {
    document.getElementById("error").innerText = e.message;
  }
};

/* AUTH STATE */
onAuthStateChanged(auth, async (user) => {

  if (!user) return;

  currentUser = user;

  /* ✅ FIXED: USING teachers collection (your real DB) */
  const snap = await getDoc(doc(db, "teachers", user.uid));

  if (!snap.exists()) {
    alert("Teacher profile not found in Firestore");
    return;
  }

  const data = snap.data();

  if (data.role !== "teacher") {
    alert("Access denied: Not a teacher");
    return;
  }

  teacherSubject = data.subject;

  document.getElementById("teacherName").innerText = data.name;
  document.getElementById("subject").innerText = teacherSubject;

  loginBox.style.display = "none";
  dashboard.style.display = "block";

  loadMarks();
});

/* SAVE MARK */
document.getElementById("saveBtn").onclick = async () => {

  const studentId = document.getElementById("studentId").value;
  const term = document.getElementById("term").value;
  const mark = document.getElementById("mark").value;

  await addDoc(collection(db, "marks"), {
    teacherId: currentUser.uid,
    subject: teacherSubject,
    studentId: studentId,
    term: term,
    mark: mark
  });

  loadMarks();
};

/* LOAD MARKS */
async function loadMarks() {

  const q = query(
    collection(db, "marks"),
    where("teacherId", "==", currentUser.uid)
  );

  const snap = await getDocs(q);

  const table = document.getElementById("table");
  table.innerHTML = "";

  snap.forEach(docSnap => {

    const m = docSnap.data();

    table.innerHTML += `
      <tr>
        <td>${m.studentId}</td>
        <td>${m.subject}</td>
        <td>${m.term}</td>
        <td>${m.mark}</td>
      </tr>
    `;
  });
}

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  location.reload();
};

</script>

</body>
</html>
