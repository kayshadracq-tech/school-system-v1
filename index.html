<!DOCTYPE html>
<html>
<head>
  <title>SMIS - School Management System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* MAIN CARD (FLYER STYLE) */
    .poster {
      width: 90%;
      max-width: 800px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .info-box {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    /* BUTTON GRID */
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 25px;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    .admin {
      background: #ef4444;
      color: white;
    }

    .teacher {
      background: #f59e0b;
      color: black;
    }

    .student {
      background: #22c55e;
      color: black;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    /* FOOTER */
    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 700px) {
      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="poster">

  <h1>🎓 School Management Information System</h1>
  <div class="subtitle">Smart • Secure • Digital School Platform</div>

  <div class="info-box">
    Welcome to the official SMIS platform.<br>
    Manage students, teachers, results, and fees in one secure system powered by Firebase technology.
  </div>

  <!-- PORTAL BUTTONS -->
  <div class="buttons">
    <button class="admin" onclick="goAdmin()">Admin Portal</button>
    <button class="teacher" onclick="goTeacher()">Teacher Portal</button>
    <button class="student" onclick="goStudent()">Student Portal</button>
  </div>

  <div class="footer">
    © 2026 SMIS | Designed for Modern Education Systems
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// FORCE LOGOUT ON LANDING
signOut(auth).catch(() => {});

// NAVIGATION
window.goAdmin = () => window.location.href = "admin.html";
window.goTeacher = () => window.location.href = "teacher.html";
window.goStudent = () => window.location.href = "student.html";

</script>

</body>
</html>
