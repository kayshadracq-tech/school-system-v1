<!DOCTYPE html><html>
<head>
  <title>Admin Dashboard</title>  <style>
    body { font-family: Arial; background:#eef2f7; padding:20px; }
    h2 { text-align:center; }

    .section {

    tr:nth-child(even){ background:#f2f2f2; }
  </style></head><body><h2>Admin Dashboard</h2><!-- STUDENTS --><div class="section">
  <h3>Students</h3>  <input id="name" placeholder="Name">
  <input id="studentId" placeholder="Student ID">
  <input id="password" placeholder="Password">
  <input id="age" placeholder="Age">
  <input id="grade" placeholder="Grade">
  <input id="className" placeholder="Class"><button id="addStudentBtn" class="add">Add</button> <button id="updateStudentBtn" class="update">Update</button>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>ID</th><th>Age</th><th>Grade</th><th>Class</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div><!-- RESULTS --><div class="section">
  <h3>Results</h3>  <input id="r_studentId" placeholder="Student ID">
  <input id="subject" placeholder="Subject">
  <input id="term" placeholder="Term">
  <input id="mark" placeholder="Mark"><button id="addResultBtn" class="add">Add</button> <button id="updateResultBtn" class="update">Update</button>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Subject</th><th>Term</th><th>Mark</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
  </table>
</div><!-- FEES --><div class="section">
  <h3>Fees</h3>  <input id="f_studentId" placeholder="Student ID">
  <input id="total" placeholder="Total Fees">
  <input id="paid" placeholder="Paid"><button id="addFeesBtn" class="add">Add</button> <button id="updateFeesBtn" class="update">Update</button>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Total</th><th>Paid</th><th>Balance</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="feesTable"></tbody>
  </table>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let sEdit=null, rEdit=null, fEdit=null;

// INPUT REFERENCES
const name = document.getElementById("name");
const studentId = document.getElementById("studentId");
const password = document.getElementById("password");
const age = document.getElementById("age");
const grade = document.getElementById("grade");
const classInput = document.getElementById("className");

const r_studentId = document.getElementById("r_studentId");
const subject = document.getElementById("subject");
const term = document.getElementById("term");
const mark = document.getElementById("mark");

const f_studentId = document.getElementById("f_studentId");
const total = document.getElementById("total");
const paid = document.getElementById("paid");

const studentTable = document.getElementById("studentTable");
const resultsTable = document.getElementById("resultsTable");
const feesTable = document.getElementById("feesTable");

/* ================= GLOBAL HELPER (NO DUPLICATES RULE) ================= */
async function existsIn(collectionName, field, value) {
  const snap = await getDocs(collection(db, collectionName));
  return snap.docs.some(d => d.data()[field] === value);
}

/* ================= STUDENTS (UNCHANGED LOGIC) ================= */



document.getElementById("addStudentBtn").onclick = async () => {
  const id = studentId.value.trim();
  if (!id) return alert("Student ID required");

  const snap = await getDocs(collection(db, "students"));

  const exists = snap.docs.some(d => d.data().studentId === id);
  if (exists) return alert("Student ID already exists!");

  await addDoc(collection(db, "students"), {
    name: name.value,
    studentId: id,
    password: password.value,
    age: age.value,
    grade: grade.value,
    class: classInput.value
  });

  clearStudentInputs();
  loadStudents();
};

document.getElementById("updateStudentBtn").onclick = async () => {
  if (!sEdit) return alert("Select student first");

  const id = studentId.value.trim();

  const snap = await getDocs(collection(db, "students"));

  const duplicate = snap.docs.some(d =>
    d.data().studentId === id && d.id !== sEdit
  );

  if (duplicate) return alert("ID already used by another student");

  await updateDoc(doc(db, "students", sEdit), {
    name: name.value,
    studentId: id,
    password: password.value,
    age: age.value,
    grade: grade.value,
    class: classInput.value
  });

  sEdit = null;
  clearStudentInputs();
  loadStudents();
};





async function studentExists(id){
  const snap = await getDocs(collection(db,"students"));
  return snap.docs.some(d=>d.data().studentId === id);
}

async function loadStudents(){
    
    
    
    
    
    
    document.getElementById("addStudentBtn").onclick = async () => {
  try {
    const id = studentId.value.trim();

    if (!id) return alert("Student ID required");

    const snap = await getDocs(collection(db, "students"));

    const exists = snap.docs.some(d => d.data().studentId === id);

    if (exists) {
      alert("Student ID already exists!");
      return;
    }

    await addDoc(collection(db, "students"), {
      name: name.value,
      studentId: id,
      password: password.value,
      age: age.value,
      grade: grade.value,
      class: classInput.value
    });

    alert("Student added successfully");

    clearStudentInputs();
    loadStudents();

  } catch (err) {
    console.error(err);
    alert("Add failed - check console");
  }
};

document.getElementById("updateStudentBtn").onclick = async () => {
  try {
    if (!sEdit) return alert("Select student first");

    const id = studentId.value.trim();

    const snap = await getDocs(collection(db, "students"));

    const duplicate = snap.docs.some(d =>
      d.data().studentId === id && d.id !== sEdit
    );

    if (duplicate) {
      alert("ID already used by another student");
      return;
    }

    await updateDoc(doc(db, "students", sEdit), {
      name: name.value,
      studentId: id,
      password: password.value,
      age: age.value,
      grade: grade.value,
      class: classInput.value
    });

    alert("Student updated successfully");

    sEdit = null;
    clearStudentInputs();
    loadStudents();

  } catch (err) {
    console.error(err);
    alert("Update failed - check console");
  }
};
    
    
    
    
    
  studentTable.innerHTML="";

  const snap = await getDocs(collection(db,"students"));

  snap.forEach(d=>{
    const s=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${s.name}</td>
      <td>${s.studentId}</td>
      <td>${s.age}</td>
      <td>${s.grade}</td>
      <td>${s.class}</td>
      <td></td>
    `;

    const action=row.children[5];

    const edit=document.createElement("button");
    edit.textContent="Edit";
    edit.className="edit";
    edit.onclick=()=>{
      sEdit=d.id;
      name.value=s.name;
      studentId.value=s.studentId;
      password.value=s.password;
      age.value=s.age;
      grade.value=s.grade;
      classInput.value=s.class;
    };

    const del=document.createElement("button");
    del.textContent="Delete";
    del.className="delete";
    del.onclick=async()=>{
      await deleteDoc(doc(db,"students",d.id));
      loadStudents();
    };

    action.appendChild(edit);
    action.appendChild(del);

    studentTable.appendChild(row);
  });
}

/* ================= RESULTS (FIXED DUPLICATES) ================= */

function clearResultInputs(){
  r_studentId.value="";
  subject.value="";
  term.value="";
  mark.value="";
}


// ADD RESULT (NO DUPLICATE student+subject+term)
document.getElementById("addResultBtn").onclick = async () => {
  const id = r_studentId.value.trim();
  const sub = subject.value.trim();
  const t = term.value.trim();

  if (!id || !sub || !t) return alert("All fields required");

  if (!(await existsIn("students","studentId",id)))
    return alert("Student does not exist!");

  const resultSnap = await getDocs(collection(db,"results"));
  const duplicate = resultSnap.docs.some(d=>{
    const r=d.data();
    return r.studentId===id && r.subject===sub && r.term===t;
  });

  if(duplicate) return alert("Result already exists!");

  await addDoc(collection(db,"results"),{
    studentId:id,
    subject:sub,
    term:t,
    mark:mark.value
  });

  clearResultInputs();
  loadResults();
};


// UPDATE RESULT

document.getElementById("updateResultBtn").onclick = async () => {
  if(!rEdit) return alert("Select result first");

  const id = r_studentId.value.trim();
  const sub = subject.value.trim();
  const t = term.value.trim();

  const resultSnap = await getDocs(collection(db,"results"));

  const duplicate = resultSnap.docs.some(d=>{
    const r=d.data();
    return d.id!==rEdit && r.studentId===id && r.subject===sub && r.term===t;
  });

  if(duplicate) return alert("Another result already exists!");

  await updateDoc(doc(db,"results",rEdit),{
    studentId:id,
    subject:sub,
    term:t,
    mark:mark.value
  });

  rEdit=null;
  clearResultInputs();
  loadResults();
};


async function loadResults(){
  resultsTable.innerHTML="";

  const snap=await getDocs(collection(db,"results"));

  snap.forEach(d=>{
    const r=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${r.studentId}</td>
      <td>${r.subject}</td>
      <td>${r.term}</td>
      <td>${r.mark}</td>
      <td></td>
    `;

    const action=row.children[4];

    const edit=document.createElement("button");
    edit.textContent="Edit";
    edit.className="edit";
    edit.onclick=()=>{
      rEdit=d.id;
      r_studentId.value=r.studentId;
      subject.value=r.subject;
      term.value=r.term;
      mark.value=r.mark;
    };

    const del=document.createElement("button");
    del.textContent="Delete";
    del.className="delete";
    del.onclick=async()=>{
      await deleteDoc(doc(db,"results",d.id));
      loadResults();
    };

    action.appendChild(edit);
    action.appendChild(del);

    resultsTable.appendChild(row);
  });
}

/* ================= FEES (FIXED SINGLE ENTRY PER STUDENT) ================= */

function clearFees(){
  f_studentId.value="";
  total.value="";
  paid.value="";
}


// ADD FEES (NO DUPLICATE studentId)
document.getElementById("addFeesBtn").onclick = async () => {
  const id = f_studentId.value.trim();

  if (!id) return alert("Student ID required");

  if (!(await existsIn("students","studentId",id)))
    return alert("Student does not exist!");

  const feeSnap = await getDocs(collection(db,"fees"));
  const duplicate = feeSnap.docs.some(d=>d.data().studentId===id);

  if(duplicate) return alert("Fees already exist for this student!");

  const t = parseFloat(total.value)||0;
  const p = parseFloat(paid.value)||0;

  await addDoc(collection(db,"fees"),{
    studentId:id,
    totalFees:t,
    amountPaid:p,
    balance:t-p
  });

  clearFees();
  loadFees();
};


// UPDATE FEES

document.getElementById("updateFeesBtn").onclick = async () => {
  if(!fEdit) return alert("Select fees first");

  const t = parseFloat(total.value)||0;
  const p = parseFloat(paid.value)||0;

  await updateDoc(doc(db,"fees",fEdit),{
    studentId:f_studentId.value,
    totalFees:t,
    amountPaid:p,
    balance:t-p
  });

  fEdit=null;
  clearFees();
  loadFees();
};


async function loadFees(){
  feesTable.innerHTML="";

  const snap=await getDocs(collection(db,"fees"));

  snap.forEach(d=>{
    const f=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${f.studentId}</td>
      <td>${f.totalFees}</td>
      <td>${f.amountPaid}</td>
      <td>${f.balance}</td>
      <td></td>
    `;

    const action=row.children[4];

    const edit=document.createElement("button");
    edit.textContent="Edit";
    edit.className="edit";
    edit.onclick=()=>{
      fEdit=d.id;
      f_studentId.value=f.studentId;
      total.value=f.totalFees;
      paid.value=f.amountPaid;
    };

    const del=document.createElement("button");
    del.textContent="Delete";
    del.className="delete";
    del.onclick=async()=>{
      await deleteDoc(doc(db,"fees",d.id));
      loadFees();
    };

    action.appendChild(edit);
    action.appendChild(del);

    feesTable.appendChild(row);
  });
}

/* INIT */
loadStudents();
loadResults();
loadFees();

</script></body>
</html>
