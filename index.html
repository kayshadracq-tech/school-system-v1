<!DOCTYPE html>
<html>
<head>
  <title>SMIS - School Management System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #eef2f7, #dbeafe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 35px;
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      color: #1e3a8a;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    .info {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      font-size: 14px;
    }

    button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e40af;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>🎓 School Management System</h1>

  <p>Welcome to the official School Management Information System (SMIS).</p>

  <div class="info">
    A secure digital platform for managing students, teachers, results, and fees in real time.
  </div>

  <p>Select your portal to continue:</p>

  <!-- PORTALS -->
  <button onclick="goAdmin()">Admin Portal</button>
  <button onclick="goTeacher()">Teacher Portal</button>
  <button onclick="goStudent()">Student Portal</button>

  <div class="footer">
    © 2026 SMIS | Powered by Firebase & Modern Web Technology
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SECURITY: force logout on landing page
signOut(auth).catch(() => {});

// NAVIGATION
window.goAdmin = () => window.location.href = "admin.html";
window.goTeacher = () => window.location.href = "teacher.html";
window.goStudent = () => window.location.href = "student.html";

</script>

</body>
</html>
