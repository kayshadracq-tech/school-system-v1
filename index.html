<!DOCTYPE html>
<html>
<head>
  <title>School System</title>
</head>
<body>

<h2>School Information System</h2>

<input id="name" placeholder="Student name">
<button onclick="addStudent()">Add Student</button>

<ul id="list"></ul>

<!-- Firebase (SAFE VERSION) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
    authDomain: "school-system-748cf.firebaseapp.com",
    projectId: "school-system-748cf",
    storageBucket: "school-system-748cf.firebasestorage.app",
    messagingSenderId: "899412742738",
    appId: "1:899412742738:web:7dc83a50b53789b196858b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const list = document.getElementById("list");
  const input = document.getElementById("name");

  window.addStudent = async function () {
    if (!input.value) return;

    try {
      // Save to Firebase
      await addDoc(collection(db, "students"), {
        name: input.value
      });

      // Show instantly on page
      const li = document.createElement("li");
      li.textContent = input.value;
      list.appendChild(li);

      input.value = "";
    } catch (error) {
      console.log(error);
      alert("Error saving to Firebase");
    }
  }
</script>

</body>
</html>
