<!DOCTYPE html>
<html>
<head>
  <title>School System</title>
</head>
<body>

<h2>School Information System</h2>

<input id="name" placeholder="Student name"><br><br>
<input id="age" placeholder="Age"><br><br>
<input id="grade" placeholder="Grade"><br><br>
<input id="class" placeholder="Class"><br><br>

<button onclick="addStudent()">Add Student</button>

<h3>Student List</h3>
<ul id="list"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
    authDomain: "school-system-748cf.firebaseapp.com",
    projectId: "school-system-748cf",
    storageBucket: "school-system-748cf.firebasestorage.app",
    messagingSenderId: "899412742738",
    appId: "1:899412742738:web:7dc83a50b53789b196858b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const list = document.getElementById("list");

  // ADD STUDENT
  window.addStudent = async function () {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    const grade = document.getElementById("grade").value;
    const studentClass = document.getElementById("class").value;

    if (!name) return;

    await addDoc(collection(db, "students"), {
      name: name,
      age: age,
      grade: grade,
      class: studentClass
    });

    loadStudents();

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("grade").value = "";
    document.getElementById("class").value = "";
  }

  // LOAD STUDENTS
  async function loadStudents() {
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "students"));

    querySnapshot.forEach((doc) => {
      const s = doc.data();

      const li = document.createElement("li");
      li.textContent = `${s.name} | Age: ${s.age} | Grade: ${s.grade} | Class: ${s.class}`;

      list.appendChild(li);
    });
  }

  loadStudents();
</script>

</body>
</html>
