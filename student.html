<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<header>
  <h2>Student Dashboard</h2>
</header>

<div class="container">

  <div class="card">
    <p id="welcome">Loading...</p>
  </div>

  <div class="card">
    <h3>Results</h3>
    <div id="results"></div>
  </div>

  <div class="card">
    <h3>Fees</h3>
    <p>Total: <span id="total"></span></p>
    <p>Paid: <span id="paid"></span></p>
    <p>Balance: <span id="balance"></span></p>
  </div>

  <p id="error" class="error"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  try {

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      document.getElementById("error").innerText = "User profile not found";
      return;
    }

    const userData = userSnap.data();

    document.getElementById("welcome").innerText =
      "Welcome " + userData.name;

    // ✅ STEP 1 FIX: SAFE studentId check
    const studentId = userData.studentId;

    if (!studentId) {
      document.getElementById("error").innerText =
        "Student ID missing in user profile";
      return;
    }

    // RESULTS
    const rQuery = query(
      collection(db, "results"),
      where("studentId", "==", studentId)
    );

    const rSnap = await getDocs(rQuery);

    const rDiv = document.getElementById("results");
    rDiv.innerHTML = "";

    if (rSnap.empty) {
      rDiv.innerText = "No results found";
    } else {
      rSnap.forEach(d => {
        const r = d.data();
        const div = document.createElement("div");
        div.innerText =
          r.subject + " (Term " + r.term + ") - " + r.mark;
        rDiv.appendChild(div);
      });
    }

    // FEES
    const fQuery = query(
      collection(db, "fees"),
      where("studentId", "==", studentId)
    );

    const fSnap = await getDocs(fQuery);

    if (!fSnap.empty) {
      const f = fSnap.docs[0].data();

      document.getElementById("total").innerText = f.totalFees || 0;
      document.getElementById("paid").innerText = f.amountPaid || 0;
      document.getElementById("balance").innerText = f.balance || 0;
    } else {
      document.getElementById("total").innerText = "0";
      document.getElementById("paid").innerText = "0";
      document.getElementById("balance").innerText = "0";
    }

  } catch (err) {
    document.getElementById("error").innerText = err.message;
  }

});

</script>

</body>
</html>
