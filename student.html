<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      text-align: center;
      padding: 15px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      cursor: pointer;
    }

    #dashboard { display: none; }
    .error { color: red; }

    #logoutBtn {
      background: red;
    }
  </style>
</head>

<body>

<header>
  <h2>Student Portal</h2>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h3>Login</h3>

    <input id="loginId" placeholder="Email or Student ID">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="card">
      <h3 id="welcome"></h3>
      <button id="logoutBtn">Logout</button>
    </div>

    <div class="card">
      <h3>Results</h3>
      <div id="results"></div>
    </div>

    <div class="card">
      <h3>Fees</h3>
      <p>Total: <span id="total"></span></p>
      <p>Paid: <span id="paid"></span></p>
      <p>Balance: <span id="balance"></span></p>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function () {

  const id = document.getElementById("loginId").value.trim();
  const pass = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  try {

    if (!id || !pass) {
      error.innerText = "Enter ID/email and password";
      return;
    }

    await signInWithEmailAndPassword(auth, id, pass);

  } catch (err) {
    error.innerText = "Login failed";
  }
};

/* AUTH CONTROL */
onAuthStateChanged(auth, async (user) => {

  if (!user) return;

  document.getElementById("loginCard").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("welcome").innerText =
    "Welcome " + (data.name || "");

  const studentId = data.studentId;

  /* RESULTS */
  const rQuery = query(
    collection(db, "results"),
    where("studentId", "==", studentId)
  );

  const rSnap = await getDocs(rQuery);

  const rDiv = document.getElementById("results");
  rDiv.innerHTML = "";

  rSnap.forEach(d => {
    const r = d.data();
    rDiv.innerHTML += `${r.subject} (Term ${r.term}) - ${r.mark}<br>`;
  });

  /* FEES */
  const fQuery = query(
    collection(db, "fees"),
    where("studentId", "==", studentId)
  );

  const fSnap = await getDocs(fQuery);

  if (!fSnap.empty) {
    const f = fSnap.docs[0].data();

    document.getElementById("total").innerText = f.totalFees || 0;
    document.getElementById("paid").innerText = f.amountPaid || 0;
    document.getElementById("balance").innerText = f.balance || 0;
  }

});

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  location.reload();
};

/* WARNING BEFORE LEAVING */
window.addEventListener("beforeunload", function (e) {
  e.preventDefault();
  e.returnValue = "";
});

</script>

</body>
</html>
