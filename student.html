<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #0f172a;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    h3 {
      margin-top: 0;
      color: #1e3a8a;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #162c6b;
    }

    .result-item {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    .fees p {
      margin: 5px 0;
    }

    .balance {
      color: green;
      font-weight: bold;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h2>Student Dashboard</h2>
</header>

<nav>
  <a href="index.html">Home</a> |
  <a href="admin.html">Admin</a>
</nav>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h3>Student Login</h3>
    <input type="text" id="studentId" placeholder="Enter Student ID">
    <button onclick="login()">Login</button>
    <div id="error" class="error"></div>
  </div>

  <!-- RESULTS -->
  <div class="card">
    <h3>My Results</h3>
    <div id="results">No results yet</div>
  </div>

  <!-- FEES -->
  <div class="card fees">
    <h3>My Fees</h3>
    <p>Total Fees: <span id="totalFees">-</span></p>
    <p>Paid: <span id="paidFees">-</span></p>
    <p>Balance: <span id="balanceFees" class="balance">-</span></p>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.login = async function () {
    const studentId = document.getElementById("studentId").value.trim();
    const errorDiv = document.getElementById("error");

    if (!studentId) {
      errorDiv.innerText = "Enter student ID";
      return;
    }

    errorDiv.innerText = "";

    try {
      const docRef = doc(db, "students", studentId);
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists()) {
        errorDiv.innerText = "Student not found";
        return;
      }

      const data = docSnap.data();

      // RESULTS
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      if (data.results && data.results.length > 0) {
        data.results.forEach(r => {
          const div = document.createElement("div");
          div.className = "result-item";
          div.innerText = `${r.subject} - ${r.score}`;
          resultsDiv.appendChild(div);
        });
      } else {
        resultsDiv.innerText = "No results yet";
      }

      // FEES
      const total = data.totalFees || 0;
      const paid = data.paid || 0;
      const balance = total - paid;

      document.getElementById("totalFees").innerText = total;
      document.getElementById("paidFees").innerText = paid;
      document.getElementById("balanceFees").innerText = balance;

    } catch (error) {
      console.error(error);
      errorDiv.innerText = "Error loading data";
    }
  };
</script>

</body>
</html>
