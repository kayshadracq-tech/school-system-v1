<!DOCTYPE html>
<html>
<head>
  <title>Student Portal</title>
  <style>
    body {
      font-family: Arial;

    .card {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      text-align: left;
    }

    a {
      margin: 5px;
      display: inline-block;
    }
  </style>
</head>
<body>

<h2>Student Login</h2>

<a href="index.html">Home</a> |
<a href="admin.html">Admin</a>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<div id="dashboard" style="display:none;">
  <h3>My Results</h3>
  <ul id="myResults"></ul>

  <h3>My Fees</h3>
  <ul id="myFees"></ul>
</div>

</div>

</html>
