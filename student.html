<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/student.css">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">
  <h2>🎓 Student Portal</h2>
  <div id="userTag"></div>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="login-wrapper" id="loginCard">
    <div class="login-box">
      <h2>Student Login</h2>
      <p class="subtitle">Access results, fees & profile</p>

      <input id="loginInput" placeholder="Email or Student ID">
      <input id="password" type="password" placeholder="Password">

      <button onclick="login()">Login</button>
      <p id="error" class="error"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard" style="display:none;">

    <!-- PROFILE CARD -->
    <div class="card profile-card">
      <h3 id="welcome">Welcome</h3>
      <p id="studentInfo"></p>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- SUMMARY GRID -->
    <div class="grid">

      <div class="card stat">
        <h4>Fees Total</h4>
        <p id="total"></p>
      </div>

      <div class="card stat">
        <h4>Fees Paid</h4>
        <p id="paid"></p>
      </div>

      <div class="card stat">
        <h4>Balance</h4>
        <p id="balance"></p>
      </div>

      <div class="card stat">
        <h4>Results Count</h4>
        <p id="resultCount">0</p>
      </div>

    </div>

    <!-- RESULTS TABLE -->
    <div class="card full">
      <h3>Academic Results</h3>

      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Term</th>
            <th>Mark</th>
          </tr>
        </thead>
        <tbody id="results"></tbody>
      </table>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE (UNCHANGED) */
const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let studentId = null;

/* LOGIN */
window.login = async function () {

  const input = document.getElementById("loginInput").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  try {

    let email = input;

    if (!input.includes("@")) {

      const q = query(
        collection(db, "students"),
        where("studentId", "==", input)
      );

      const snap = await getDocs(q);

      if (snap.empty) {
        error.innerText = "Student not found";
        return;
      }

      email = snap.docs[0].data().email;
    }

    await signInWithEmailAndPassword(auth, email, password);

  } catch (e) {
    error.innerText = "Login failed";
  }
};

/* AUTH */
onAuthStateChanged(auth, async (user) => {

  // ❌ NO USER → SHOW LOGIN ONLY
  if (!user) {
    document.getElementById("loginCard").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    return;
  }

  // 🚨 FORCE HIDE EVERYTHING FIRST (IMPORTANT FIX)
  document.getElementById("loginCard").style.display = "none";
  document.getElementById("dashboard").style.display = "none";

  try {

    const q = query(
      collection(db, "students"),
      where("uid", "==", user.uid)
    );

    const snap = await getDocs(q);

    // ❌ NOT A STUDENT
    if (snap.empty) {
      await signOut(auth);
      return;
    }

    const student = snap.docs[0].data();

    // ❌ ROLE CHECK
    if (student.role !== "student") {
      await signOut(auth);
      return;
    }

    // ✅ ONLY NOW SHOW DASHBOARD
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    studentId = student.studentId;

    loadResults();
    loadFees();

  } catch (err) {
    console.error(err);
    await signOut(auth);
  }
});
  

/* RESULTS */
async function loadResults() {

  const q = query(
    collection(db, "results"),
    where("studentId", "==", studentId)
  );

  const snap = await getDocs(q);

  const table = document.getElementById("results");
  table.innerHTML = "";

  let count = 0;

  snap.forEach(doc => {

    const r = doc.data();
    count++;

    table.innerHTML += `
      <tr>
        <td>${r.subject}</td>
        <td>${r.term}</td>
        <td>${r.mark}</td>
      </tr>
    `;
  });

  document.getElementById("resultCount").innerText = count;
}

/* FEES */
async function loadFees() {

  const q = query(
    collection(db, "fees"),
    where("studentId", "==", studentId)
  );

  const snap = await getDocs(q);

  if (snap.empty) return;

  const f = snap.docs[0].data();

  document.getElementById("total").innerText = f.totalFees || 0;
  document.getElementById("paid").innerText = f.amountPaid || 0;
  document.getElementById("balance").innerText = f.balance || 0;
}

/* LOGOUT */
window.logout = async function () {
  await signOut(auth);
  location.reload();
};

</script>

</body>
</html>
