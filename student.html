<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #1e3a8a;
      color: white;
      border: none;
    }

    #resultsCard, #feesCard {
      display: none;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<header>
  <h2>Student Dashboard</h2>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <input type="text" id="studentId" placeholder="Student ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
  </div>

  <!-- RESULTS -->
  <div class="card" id="resultsCard">
    <h3>Results</h3>
    <div id="results"></div>
  </div>

  <!-- FEES -->
  <div class="card" id="feesCard">
    <h3>Fees</h3>
    <p>Total: <span id="totalFees"></span></p>
    <p>Paid: <span id="paidFees"></span></p>
    <p>Balance: <span id="balanceFees"></span></p>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    query, 
    where, 
    getDocs 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔴 USE YOUR REAL CONFIG (same as admin page)
  const firebaseConfig = {
    apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
    authDomain: "school-system-748cf.firebaseapp.com",
    projectId: "school-system-748cf",
    storageBucket: "school-system-748cf.firebasestorage.app",
    messagingSenderId: "899412742738",
    appId: "1:899412742738:web:7dc83a50b53789b196858b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.login = async function () {

    const id = document.getElementById("studentId").value.trim();
    const pass = document.getElementById("password").value.trim();
    const error = document.getElementById("error");

    error.innerText = "";

    try {

      if (!id || !pass) {
        error.innerText = "Enter ID and password";
        return;
      }

      // ✅ SEARCH STUDENT BY studentId
      const q = query(
        collection(db, "students"),
        where("studentId", "==", id)
      );

      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        error.innerText = "Student not found";
        return;
      }

      const docSnap = querySnapshot.docs[0];
      const data = docSnap.data();

      // PASSWORD CHECK
      if (data.password !== pass) {
        error.innerText = "Wrong password";
        return;
      }

      // SHOW SECTIONS
      document.getElementById("resultsCard").style.display = "block";
      document.getElementById("feesCard").style.display = "block";

      // TEMP PLACEHOLDER (next step will load real data)
      document.getElementById("results").innerText = "Login successful ✔";
      document.getElementById("totalFees").innerText = "...";
      document.getElementById("paidFees").innerText = "...";
      document.getElementById("balanceFees").innerText = "...";

    } catch (err) {
      console.error(err);
      error.innerText = err.message;
    }
  };
</script>

</body>
</html>
