<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #1e3a8a;
      color: white;
      border: none;
    }

    #resultsCard, #feesCard {
      display: none;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<header>
  <h2>Student Dashboard</h2>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <input type="text" id="studentId" placeholder="Student ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
  </div>

  <!-- RESULTS -->
  <div class="card" id="resultsCard">
    <h3>Results</h3>
    <div id="results"></div>
  </div>

  <!-- FEES -->
  <div class="card" id="feesCard">
    <h3>Fees</h3>
    <p>Total: <span id="totalFees"></span></p>
    <p>Paid: <span id="paidFees"></span></p>
    <p>Balance: <span id="balanceFees"></span></p>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔴 YOUR FIREBASE CONFIG HERE (MUST BE CORRECT)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.login = async function () {

    const id = document.getElementById("studentId").value.trim();
    const pass = document.getElementById("password").value.trim();
    const error = document.getElementById("error");

    error.innerText = "";

    try {

      if (!id || !pass) {
        error.innerText = "Enter ID and password";
        return;
      }

      const ref = doc(db, "students", id);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        error.innerText = "Student not found";
        return;
      }

      const data = snap.data();

      if (data.password !== pass) {
        error.innerText = "Wrong password";
        return;
      }

      // SHOW SECTIONS
      document.getElementById("resultsCard").style.display = "block";
      document.getElementById("feesCard").style.display = "block";

      // RESULTS
      const r = document.getElementById("results");
      r.innerHTML = "";

      if (data.results) {
        data.results.forEach(x => {
          const div = document.createElement("div");
          div.innerText = x.subject + " - " + x.score;
          r.appendChild(div);
        });
      } else {
        r.innerText = "No results";
      }

      // FEES
      const total = data.totalFees || 0;
      const paid = data.paid || 0;

      document.getElementById("totalFees").innerText = total;
      document.getElementById("paidFees").innerText = paid;
      document.getElementById("balanceFees").innerText = total - paid;

    } catch (err) {
      console.error("REAL ERROR:", err);
      error.innerText = err.message; // SHOW REAL REASON
    }
  };
</script>

</body>
</html>
