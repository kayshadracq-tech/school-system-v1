<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #1e3a8a;
      color: white;
      text-align: center;
      padding: 15px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #1e3a8a;
      color: white;
      border: none;
    }

    #dashboard {
      display: none;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<header>
  <h2>Student Portal</h2>
</header>

<div class="container">

  <!-- LOGIN CARD -->
  <div class="card" id="loginCard">
    <h3>Login</h3>

    <input id="studentId" placeholder="Student ID">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error" class="error"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="card">
      <h3>Results</h3>
      <div id="results"></div>
    </div>

    <div class="card">
      <h3>Fees</h3>
      <p>Total: <span id="total"></span></p>
      <p>Paid: <span id="paid"></span></p>
      <p>Balance: <span id="balance"></span></p>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function () {

  const id = document.getElementById("studentId").value.trim();
  const pass = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  if (!id || !pass) {
    error.innerText = "Enter ID and password";
    return;
  }

  try {

    const q = query(
      collection(db, "students"),
      where("studentId", "==", id),
      where("password", "==", pass)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      error.innerText = "Invalid login";
      return;
    }

    const student = snap.docs[0].data();

    // SWITCH UI
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadData(student.studentId);

  } catch (err) {
    error.innerText = err.message;
  }
};

async function loadData(studentId) {

  // RESULTS
  const r = document.getElementById("results");
  r.innerHTML = "";

  const rq = query(
    collection(db, "results"),
    where("studentId", "==", studentId)
  );

  const rs = await getDocs(rq);

  rs.forEach(d => {
    const x = d.data();
    const div = document.createElement("div");
    div.innerText = x.subject + " (Term " + x.term + ") - " + x.mark;
    r.appendChild(div);
  });

  // FEES
  const fq = query(
    collection(db, "fees"),
    where("studentId", "==", studentId)
  );

  const fs = await getDocs(fq);

  if (!fs.empty) {
    const f = fs.docs[0].data();
    document.getElementById("total").innerText = f.totalFees || 0;
    document.getElementById("paid").innerText = f.amountPaid || 0;
    document.getElementById("balance").innerText = f.balance || 0;
  }
}

</script>

</body>
</html>
