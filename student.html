<!DOCTYPE html>
<html>
<head>
  <title>Student Portal</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      text-align: left;
    }

    a {
      margin: 5px;
      display: inline-block;
    }
  </style>
</head>
<body>

<div class="card">

<h2>Student Login</h2>

<a href="index.html">Home</a> |
<a href="admin.html">Admin</a>

<br><br>

<input id="studentId" placeholder="Student ID"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<div id="dashboard" style="display:none;">
  <h3>My Results</h3>
  <ul id="myResults"></ul>

  <h3>My Fees</h3>
  <ul id="myFees"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN CHECK (simple demo login using studentId) */
window.login = async function () {

  const id = document.getElementById("studentId").value;
  const pass = document.getElementById("password").value;

  const msg = document.getElementById("msg");

  if (!id || !pass) {
    msg.innerText = "Enter ID and password";
    return;
  }

  // SIMPLE CHECK (you can upgrade later to Firebase Auth)
  const studentsSnap = await getDocs(collection(db, "students"));

  let found = null;

  studentsSnap.forEach(doc => {
    const s = doc.data();
    if (s.studentId === id && s.password === pass) {
      found = s;
    }
  });

  if (!found) {
    msg.innerText = "Invalid login";
    return;
  }

  msg.innerText = "";

  document.getElementById("dashboard").style.display = "block";

  loadResults(id);
  loadFees(id);
};

/* LOAD RESULTS */
async function loadResults(studentId) {

  const list = document.getElementById("myResults");
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "results"));

  let has = false;

  snap.forEach(d => {
    const r = d.data();

    if (r.studentId === studentId) {
      has = true;

      const li = document.createElement("li");
      li.innerText = `${r.subject} - ${r.term} : ${r.mark}`;
      list.appendChild(li);
    }
  });

  if (!has) {
    list.innerHTML = "<li>No results yet</li>";
  }
}

/* LOAD FEES */
async function loadFees(studentId) {

  const list = document.getElementById("myFees");
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "fees"));

  let found = false;

  snap.forEach(d => {
    const f = d.data();

    if (f.studentId === studentId) {
      found = true;

      const li = document.createElement("li");

      li.innerHTML = `
        Total Fees: ${f.totalFees}<br>
        Paid: ${f.amountPaid}<br>
        Balance: <b>${f.balance}</b>
      `;

      list.appendChild(li);
    }
  });

  if (!found) {
    list.innerHTML = "<li>No fees record</li>";
  }
}

</script>
</body>
</html>
