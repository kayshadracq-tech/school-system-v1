<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GLOBAL FIRST -->
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/student.css">
</head>

<body>

<header>
  <h2>Student Portal</h2>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="login-wrapper" id="loginCard">
    <div class="login-box">
      <h2>🎓 Student Portal</h2>
      <p class="subtitle">Sign in to access results and fees</p>

      <input id="loginInput" placeholder="Email or Student ID">
      <input id="password" type="password" placeholder="Password">

      <button onclick="login()">Login</button>
      <p id="error" class="error"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <div class="card">
      <h3 id="welcome"></h3>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h3>Results</h3>
      <div id="results"></div>
    </div>

    <div class="card">
      <h3>Fees</h3>
      <p>Total: <span id="total"></span></p>
      <p>Paid: <span id="paid"></span></p>
      <p>Balance: <span id="balance"></span></p>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE (UNCHANGED) */
const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentStudentId = null;

/* LOGIN */
window.login = async function () {

  const input = document.getElementById("loginInput").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  try {

    let email = input;

    if (!input.includes("@")) {

      const q = query(
        collection(db, "students"),
        where("studentId", "==", input)
      );

      const snap = await getDocs(q);

      if (snap.empty) {
        error.innerText = "Student ID not found";
        return;
      }

      email = snap.docs[0].data().email;
    }

    await signInWithEmailAndPassword(auth, email, password);

  } catch (err) {
    error.innerText = "Login failed";
  }
};

/* AUTH */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    document.getElementById("loginCard").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    return;
  }

  document.getElementById("loginCard").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  const q = query(
    collection(db, "students"),
    where("uid", "==", user.uid)
  );

  const snap = await getDocs(q);

  if (snap.empty) return;

  const student = snap.docs[0].data();

  currentStudentId = student.studentId;

  document.getElementById("welcome").innerText =
    "Welcome " + (student.name || student.email);

  loadResults();
  loadFees();
});

/* LOGOUT */
window.logout = async function () {
  await signOut(auth);
  location.reload();
};

/* RESULTS */
async function loadResults() {

  const q = query(
    collection(db, "results"),
    where("studentId", "==", currentStudentId)
  );

  const snap = await getDocs(q);

  const div = document.getElementById("results");
  div.innerHTML = "";

  snap.forEach(doc => {
    const r = doc.data();
    div.innerHTML += `${r.subject} (Term ${r.term}) - ${r.mark}<br>`;
  });
}

/* FEES */
async function loadFees() {

  const q = query(
    collection(db, "fees"),
    where("studentId", "==", currentStudentId)
  );

  const snap = await getDocs(q);

  if (snap.empty) return;

  const f = snap.docs[0].data();

  document.getElementById("total").innerText = f.totalFees || 0;
  document.getElementById("paid").innerText = f.amountPaid || 0;
  document.getElementById("balance").innerText = f.balance || 0;
}

</script>

</body>
</html>
