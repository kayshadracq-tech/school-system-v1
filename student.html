<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      text-align: center;
      padding: 15px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      cursor: pointer;
    }

    #dashboard { display: none; }
    .error { color: red; }

    #logoutBtn {
      background: red;
    }
  </style>
</head>

<body>

<header>
  <h2>Student Portal</h2>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h3>Login</h3>

    <input id="loginInput" placeholder="Email or Student ID">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="card">
      <h3 id="welcome"></h3>
      <button id="logoutBtn">Logout</button>
    </div>

    <div class="card">
      <h3>Results</h3>
      <div id="results"></div>
    </div>

    <div class="card">
      <h3>Fees</h3>
      <p>Total: <span id="total"></span></p>
      <p>Paid: <span id="paid"></span></p>
      <p>Balance: <span id="balance"></span></p>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ================= LOGIN ================= */
window.login = async function () {

  const input = document.getElementById("loginInput").value.trim();
  const pass = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  if (!input || !pass) {
    error.innerText = "Enter Email/Student ID and Password";
    return;
  }

  const snap = await getDocs(collection(db, "students"));

  let found = null;

  snap.forEach(docSnap => {
    const d = docSnap.data();

    if (
      (d.email === input || d.studentId === input) &&
      d.password === pass
    ) {
      found = d;
    }
  });

  if (!found) {
    error.innerText = "Login failed";
    return;
  }

  // SESSION
  sessionStorage.setItem("studentId", found.studentId);
  sessionStorage.setItem("studentName", found.name);

  // SHOW DASHBOARD
  document.getElementById("loginCard").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("welcome").innerText =
    "Welcome " + found.name;

  loadData(found.studentId);
};

/* ================= LOAD DATA ================= */
async function loadData(studentId) {

  // RESULTS
  const resultsSnap = await getDocs(collection(db, "results"));

  const rDiv = document.getElementById("results");
  rDiv.innerHTML = "";

  resultsSnap.forEach(d => {
    const r = d.data();

    if (r.studentId === studentId) {
      rDiv.innerHTML +=
        `${r.subject} (Term ${r.term}) - ${r.mark}<br>`;
    }
  });

  // FEES
  const feesSnap = await getDocs(collection(db, "fees"));

  feesSnap.forEach(d => {
    const f = d.data();

    if (f.studentId === studentId) {
      document.getElementById("total").innerText = f.totalFees || 0;
      document.getElementById("paid").innerText = f.amountPaid || 0;
      document.getElementById("balance").innerText = f.balance || 0;
    }
  });
}

/* ================= LOGOUT ================= */
document.getElementById("logoutBtn").onclick = async () => {

  sessionStorage.clear();
  await signOut(auth).catch(()=>{});

  location.reload();
};

/* ================= LEAVE WARNING ================= */
window.addEventListener("beforeunload", function (e) {
  e.preventDefault();
  e.returnValue = "You will be logged out if you leave this page.";
});

</script>

</body>
</html>
