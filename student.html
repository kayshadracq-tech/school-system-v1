<!DOCTYPE html>
<html>
<head>
  <title>Student Portal</title>
</head>
<body>

<h2>Student Login</h2>

<a href="index.html">Home</a> |
<a href="admin.html">Admin</a>

<br><br>

<input id="studentId" placeholder="Student ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<div id="dashboard" style="display:none;">
  <h3>Welcome Student</h3>
  <ul id="myResults"></ul>
  <ul id="myFees"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let current = null;

window.login = async function () {
  const id = document.getElementById("studentId").value;
  const pass = document.getElementById("password").value;

  const snap = await getDocs(collection(db, "students"));

  snap.forEach(doc => {
    const s = doc.data();

    if (s.studentId === id && s.password === pass) {
      current = s;
    }
  });

  if (current) {
    document.getElementById("msg").innerText = "Login OK";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  } else {
    document.getElementById("msg").innerText = "Wrong login";
  }
};

async function loadData() {
  const res = document.getElementById("myResults");
  const fees = document.getElementById("myFees");

  const rSnap = await getDocs(collection(db, "results"));
  const fSnap = await getDocs(collection(db, "fees"));

  rSnap.forEach(doc => {
    const r = doc.data();
    if (r.studentName === current.name) {
      const li = document.createElement("li");
      li.textContent = r.subject + " - " + r.mark;
      res.appendChild(li);
    }
  });

  fSnap.forEach(doc => {
    const f = doc.data();
    if (f.studentName === current.name) {
      const li = document.createElement("li");
      li.textContent = "Balance: " + f.balance;
      fees.appendChild(li);
    }
  });
}
</script>

</body>
</html>
