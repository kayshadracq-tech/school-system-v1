<!DOCTYPE html>
<html>
<head>
  
  <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/admin.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
    
</head>
  

<body>

  <!-- PREMIUM NAVBAR -->
  
<!-- SIDEBAR LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="brand">
      🎓 SIS Admin
    </div>

    <div class="menu">
      <div class="menu-item active" onclick="showSection('home')">Dashboard</div>
      <div class="menu-item" onclick="showSection('students')">Students</div>
      <div class="menu-item" onclick="showSection('results')">Results</div>
      <div class="menu-item" onclick="showSection('fees')">Fees</div>
    </div>

    <div class="sidebar-footer">
      <span id="adminName">Admin</span>
      <button onclick="logoutAdmin()">Logout</button>
      
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
  
  </div>

</div>


  
<!-- HOME SECTION (REAL DASHBOARD) -->
<div class="section" id="home">

  <h3>Admin Dashboard</h3>

  <div class="dashboard-grid">

    <div class="card">
      <h4>Total Students</h4>
      <p id="totalStudents">0</p>
    </div>

    <div class="card">
      <h4>Total Results</h4>
      <p id="totalResults">0</p>
    </div>

    <div class="card">
      <h4>Total Fees Records</h4>
      <p id="totalFees">0</p>
    </div>

  </div>

</div>
  
  
  
<!-- LOGIN -->
<div id="loginGate">
  <div class="loginBox">
    <h3>Admin Login</h3>
    <input id="adminEmail" placeholder="Email">
    <input id="adminPass" type="password" placeholder="Password">
    <button id="adminLoginBtn" class="add">Login</button>
    <p id="adminError" class="error"></p>
  </div>
</div>

<!-- STUDENTS -->
<div class="section" id="students">
  <h3>Students</h3>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="studentId" placeholder="Student ID">
  <input id="password" placeholder="Password">
  <input id="age" placeholder="Age">
  <input id="grade" placeholder="Grade">
  <input id="className" placeholder="Class">

  <button id="addStudentBtn" class="add">Add</button>
  <button id="updateStudentBtn" class="update">Update</button>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>Email</th><th>ID</th><th>Age</th><th>Grade</th><th>Class</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div>

<!-- RESULTS -->
<div class="section" id="results">
  <h3>Results</h3>

  <input id="r_studentId" placeholder="Student ID">
  <input id="subject" placeholder="Subject">
  <input id="term" placeholder="Term">
  <input id="mark" placeholder="Mark">

  <button id="addResultBtn" class="add">Add</button>
  <button id="updateResultBtn" class="update">Update</button>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Subject</th><th>Term</th><th>Mark</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
  </table>
</div>

<!-- FEES -->
<div class="section" id="fees">
  <h3>Fees</h3>

  <input id="f_studentId" placeholder="Student ID">
  <input id="total" placeholder="Total Fees">
  <input id="paid" placeholder="Paid">

  <button id="addFeesBtn" class="add">Add</button>
  <button id="updateFeesBtn" class="update">Update</button>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Total</th><th>Paid</th><th>Balance</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="feesTable"></tbody>
  </table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const adminLoginBtn = document.getElementById("adminLoginBtn");
const adminEmail = document.getElementById("adminEmail");
const adminPass = document.getElementById("adminPass");
const adminError = document.getElementById("adminError");

  
/* LOGIN */
adminLoginBtn.onclick = async () => {
  adminError.innerText = "";
  try {
    await signInWithEmailAndPassword(auth, adminEmail.value.trim(), adminPass.value.trim());
  } catch {
    adminError.innerText = "Invalid email or password";
  }
};

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if (!user) return;

  // show admin email
  document.getElementById("adminName").innerText = user.email;

  loginGate.remove();


  // hide all sections first
  document.querySelectorAll(".section").forEach(s => s.style.display = "none");

  // show only home
  showSection("home");
});

/* STATES */
let sEdit=null, rEdit=null, fEdit=null;

/* INPUTS */
const name = document.getElementById("name");
const email = document.getElementById("email");
const studentId = document.getElementById("studentId");
const password = document.getElementById("password");
const age = document.getElementById("age");
const grade = document.getElementById("grade");
const classInput = document.getElementById("className");

const r_studentId = document.getElementById("r_studentId");
const subject = document.getElementById("subject");
const term = document.getElementById("term");
const mark = document.getElementById("mark");

const f_studentId = document.getElementById("f_studentId");
const total = document.getElementById("total");
const paid = document.getElementById("paid");

/* TABLES */
const studentTable = document.getElementById("studentTable");
const resultsTable = document.getElementById("resultsTable");
const feesTable = document.getElementById("feesTable");

/* CHECK ID */
async function idExists(id){
  const snap = await getDocs(collection(db,"students"));
  return snap.docs.some(d => d.data().studentId === id);
}

/* STUDENTS */
addStudentBtn.onclick = async () => {

  const id = studentId.value.trim();
  const mail = email.value.trim();
  const pass = password.value.trim();

  if (!id || !mail || !pass) return alert("Email, ID, password required");

  if (await idExists(id)) return alert("Student ID exists");

  try {

    const userCred = await createUserWithEmailAndPassword(auth, mail, pass);
    const uid = userCred.user.uid;

    await setDoc(doc(db,"students", id),{
      uid,
      name: name.value,
      email: mail,
      studentId: id,
      age: age.value,
      grade: grade.value,
      class: classInput.value
    });

    loadStudents();
  alert("Student added successfully");  

    // clear form after adding
name.value = "";
email.value = "";
studentId.value = "";
password.value = "";
age.value = "";
grade.value = "";
classInput.value = "";

  } catch(err){
    alert(err.message);
  }

};

updateStudentBtn.onclick = async () => {
  if (!sEdit) return alert("Select student");

  await updateDoc(doc(db,"students",sEdit),{
    name:name.value,
    email:email.value,
    studentId:studentId.value,
    age:age.value,
    grade:grade.value,
    class:classInput.value
  });

  sEdit=null;
  loadStudents();
};

async function loadStudents(){
  studentTable.innerHTML="";
  const snap = await getDocs(collection(db,"students"));
  
  document.getElementById("totalStudents").innerText = snap.size;
  
  snap.forEach(d=>{
    const s=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${s.name}</td>
      <td>${s.email}</td>
      <td>${s.studentId}</td>
      <td>${s.age}</td>
      <td>${s.grade}</td>
      <td>${s.class}</td>
      <td></td>
    `;

    const action=row.children[6];

    const edit=document.createElement("button");
    edit.textContent="Edit";
    edit.className="edit";
    edit.onclick=()=>{
      sEdit=d.id;
      name.value=s.name;
      email.value=s.email;
      studentId.value=s.studentId;
      age.value=s.age;
      grade.value=s.grade;
      classInput.value=s.class;
    };

    const del=document.createElement("button");
    del.textContent="Delete";
    del.className="delete";
    del.onclick=async()=>{
      await deleteDoc(doc(db,"students",d.id));
      loadStudents();
    };

    action.appendChild(edit);
    action.appendChild(del);

    studentTable.appendChild(row);
  });
}

/* RESULTS */
addResultBtn.onclick = async () => {
  await setDoc(doc(db,"results", r_studentId.value + "_" + subject.value + "_" + term.value), {
  studentId: r_studentId.value,
  subject: subject.value,
  term: term.value,
  mark: mark.value
});
  loadResults();
};

updateResultBtn.onclick = async () => {
  await updateDoc(doc(db,"results",rEdit),{
    studentId:r_studentId.value,
    subject:subject.value,
    term:term.value,
    mark:mark.value
  });
  rEdit=null;
  loadResults();
};

async function loadResults(){
  resultsTable.innerHTML="";
  const snap=await getDocs(collection(db,"results"));

  document.getElementById("totalResults").innerText = snap.size;

  snap.forEach(d=>{
    const r=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${r.studentId}</td>
      <td>${r.subject}</td>
      <td>${r.term}</td>
      <td>${r.mark}</td>
      <td></td>
    `;

    const action=row.children[4];

    const edit = document.createElement("button");
edit.textContent = "Edit";
edit.className = "edit";
edit.onclick = () => {
  rEdit = d.id;

  r_studentId.value = r.studentId;
  subject.value = r.subject;
  term.value = r.term;
  mark.value = r.mark;
};

const del = document.createElement("button");
del.textContent = "Delete";
del.className = "delete";
del.onclick = async () => {
  await deleteDoc(doc(db, "results", d.id));
  loadResults();
};

action.appendChild(edit);
action.appendChild(del);

    resultsTable.appendChild(row);
  });
}

/* FEES */
addFeesBtn.onclick = async () => {
  const t = Number(total.value)||0;
  const p = Number(paid.value)||0;

  await setDoc(doc(db,"fees", f_studentId.value), {
  studentId: f_studentId.value,
  totalFees: t,
  amountPaid: p,
  balance: t - p
});

  loadFees();
};

updateFeesBtn.onclick = async () => {
  const t = Number(total.value)||0;
  const p = Number(paid.value)||0;

  await updateDoc(doc(db,"fees",fEdit),{
    studentId:f_studentId.value,
    totalFees:t,
    amountPaid:p,
    balance:t-p
  });

  fEdit=null;
  loadFees();
};

async function loadFees(){
  feesTable.innerHTML="";
  const snap=await getDocs(collection(db,"fees"));

  document.getElementById("totalFees").innerText = snap.size;

  snap.forEach(d=>{
    const f=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${f.studentId}</td>
      <td>${f.totalFees}</td>
      <td>${f.amountPaid}</td>
      <td>${f.balance}</td>
      <td></td>
    `;

    const action=row.children[4];

    const edit=document.createElement("button");
    edit.textContent="Edit";
    edit.className="edit";
    edit.onclick=()=>{
      fEdit=d.id;
      f_studentId.value=f.studentId;
      total.value=f.totalFees;
      paid.value=f.amountPaid;
    };

    const del=document.createElement("button");
    del.textContent="Delete";
    del.className="delete";
    del.onclick=async()=>{
      await deleteDoc(doc(db,"fees",d.id));
      loadFees();
    };

    action.appendChild(edit);
    action.appendChild(del);

    feesTable.appendChild(row);
  });
}

/* INIT */
loadStudents();
loadResults();
loadFees();




// NAVIGATION
window.showSection = (section) => {

  // remove active highlight (SIDEBAR)
  document.querySelectorAll(".menu-item").forEach(item => {
    item.classList.remove("active");
  });

  // map sections to sidebar menu
  const map = {
    home: 0,
    students: 1,
    results: 2,
    fees: 3
  };

  document.querySelectorAll(".menu-item")[map[section]].classList.add("active");

  // hide all sections
  document.querySelectorAll(".section").forEach(s => {
    s.style.display = "none";
  });

  // show selected section
  document.getElementById(section).style.display = "block";
};
  });

  // highlight current
  const map = {
    home: 0,
    students: 1,
    results: 2,
    fees: 3
  };

  document.querySelectorAll(".nav-item")[map[section]].classList.add("active");

  // hide all sections
  document.querySelectorAll(".section").forEach(s => {
    s.style.display = "none";
  });

  // show selected
  if (section === "home") {
  document.getElementById("home").style.display = "block";
  return;
                                                                     }
if (section === "students") {
  document.getElementById("students").style.display = "block";
}

if (section === "results") {
  document.getElementById("results").style.display = "block";
}

if (section === "fees") {
  document.getElementById("fees").style.display = "block";
}

};



// =======================
// LOGOUT FUNCTION
// =======================

window.logoutAdmin = async () => {
  try {
    // Sign out current admin user
    await signOut(auth);

    // Show login screen again
    document.body.innerHTML = `
      <div id="loginGate" style="display:flex;justify-content:center;align-items:center;height:100vh;background:#eef2f7;">
        <div style="background:white;padding:25px;border-radius:10px;width:320px;text-align:center;">
          <h3>Admin Login</h3>
          <p>Please refresh the page to login again</p>
        </div>
      </div>
    `;

  } catch (err) {
    alert("Logout failed: " + err.message);
  }
};
</script>

</body>
</html>
