<!DOCTYPE html>
<html>
<head>
  
  <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/admin.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
    
</head>
  

<body>


  
<!-- SIDEBAR LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="brand">
      🎓 SMIS Admin
    </div>

<div class="menu">
  <div class="menu-item" onclick="window.location.href='index.html'">Home</div>
  <div class="menu-item active" onclick="showSection('home')">Dashboard</div>
  <div class="menu-item" onclick="showSection('students')">Students</div>
  <div class="menu-item" onclick="showSection('results')">Results</div>
  <div class="menu-item" onclick="showSection('fees')">Fees</div>
</div>
    
    <div class="sidebar-footer">
      <span id="adminName">Admin</span>
      <button onclick="logoutAdmin()">Logout</button>
      
    </div>
  </div>


  <!-- MAIN CONTENT (ALL SECTIONS MUST BE HERE) -->
  <div class="main">

    <!-- LOGIN MUST ALSO BE HERE -->
    <div id="loginGate">
      <div class="loginBox">
        <h3>Admin Login</h3>
        <input id="adminEmail" placeholder="Email">
        <input id="adminPass" type="password" placeholder="Password">
        <button id="adminLoginBtn" class="add">Login</button>
        <p id="adminError" class="error"></p>
      </div>
    </div>

    <!-- HOME -->
    <div class="section" id="home">
  <h2>Dashboard Home</h2>
  <div class="dashboard-grid">
    <div class="card">
      <h4>Total Students</h4>
      <p id="totalStudents">0</p>
    </div>

    <div class="card">
      <h4>Total Results</h4>
      <p id="totalResults">0</p>
    </div>

    <div class="card">
      <h4>Total Fees Records</h4>
      <p id="totalFees">0</p>
    </div>
  </div>
</div>

    <!-- STUDENTS -->
    <div class="section" id="students">

  <h2>Students Management</h2>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="studentId" placeholder="Student ID">
  <input id="password" type="password" placeholder="Password">
  <input id="age" placeholder="Age">
  <input id="grade" placeholder="Grade">
  <input id="className" placeholder="Class">

  <button id="addStudentBtn" class="add">Add Student</button>
  <button id="updateStudentBtn" class="update">Update Student</button>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>Email</th><th>ID</th><th>Age</th><th>Grade</th><th>Class</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>

</div>

    <!-- RESULTS -->
    <div class="section" id="results">

  <h2>Results Management</h2>

  <input id="r_studentId" placeholder="Student ID">
  <input id="subject" placeholder="Subject">
  <input id="term" placeholder="Term">
  <input id="mark" placeholder="Mark">

  <button id="addResultBtn" class="add">Add Result</button>
  <button id="updateResultBtn" class="update">Update Result</button>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Subject</th><th>Term</th><th>Mark</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
  </table>

</div>
    <!-- FEES -->
    <div class="section" id="fees">

  <h2>Fees Management</h2>

  <input id="f_studentId" placeholder="Student ID">
  <input id="total" placeholder="Total Fees">
  <input id="paid" placeholder="Paid Amount">

  <button id="addFeesBtn" class="add">Add Fees</button>
  <button id="updateFeesBtn" class="update">Update Fees</button>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Total</th><th>Paid</th><th>Balance</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="feesTable"></tbody>
  </table>

</div>
  </div>
</div>      
  
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ELEMENTS */
const adminLoginBtn = document.getElementById("adminLoginBtn");
const adminEmail = document.getElementById("adminEmail");
const adminPass = document.getElementById("adminPass");
const adminError = document.getElementById("adminError");
const loginGate = document.getElementById("loginGate");

/* LOGIN */
adminLoginBtn.onclick = async () => {
  adminError.innerText = "";
  try {
    await signInWithEmailAndPassword(
      auth,
      adminEmail.value.trim(),
      adminPass.value.trim()
    );
  } catch {
    adminError.innerText = "Invalid email or password";
  }
};

/* AUTH STATE */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    loginGate.style.display = "flex";
    return;
  }

  try {

    // 🔐 CHECK ADMIN COLLECTION ONLY
const q = await getDocs(collection(db, "admins"));
const snap = q.docs.find(d => d.data().email === user.email);
    
if (!snap) {

      alert("Access denied: Not admin");

      await signOut(auth);

      loginGate.style.display = "flex";

      document.querySelectorAll(".section").forEach(s => {
        s.style.display = "none";
      });

      return;
    }

const data = snap.data();

    if (data.role !== "admin") {

      alert("Invalid admin role");

      await signOut(auth);

      loginGate.style.display = "flex";

      return;
    }

    // ✅ SUCCESS LOGIN
    document.getElementById("adminName").innerText = data.email || user.email;

    loginGate.style.display = "none";

    showSection("home");
    loadStudents();
    loadResults();
    loadFees();

  } catch (err) {
    console.error(err);
    alert("Error loading admin profile");
  }
});

/* STATES */
let sEdit = null;
let rEdit = null;
let fEdit = null;

/* INPUTS */
const name = document.getElementById("name");
const email = document.getElementById("email");
const studentId = document.getElementById("studentId");
const password = document.getElementById("password");
const age = document.getElementById("age");
const grade = document.getElementById("grade");
const classInput = document.getElementById("className");

const r_studentId = document.getElementById("r_studentId");
const subject = document.getElementById("subject");
const term = document.getElementById("term");
const mark = document.getElementById("mark");

const f_studentId = document.getElementById("f_studentId");
const total = document.getElementById("total");
const paid = document.getElementById("paid");

/* TABLES */
const studentTable = document.getElementById("studentTable");
const resultsTable = document.getElementById("resultsTable");
const feesTable = document.getElementById("feesTable");

/* =========================
   NAVIGATION FIX
========================= */
window.showSection = (section) => {

  document.querySelectorAll(".menu-item").forEach(i => i.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s => s.style.display = "none");

  const el = document.getElementById(section);
  if (el) el.style.display = "block";

  const map = { home: 0, students: 1, results: 2, fees: 3 };
  const items = document.querySelectorAll(".menu-item");

  if (items[map[section]]) {
    items[map[section]].classList.add("active");
  }
};

/* =========================
   STUDENTS
========================= */

async function idExists(id) {
  const snap = await getDocs(collection(db, "students"));
  return snap.docs.some(d => d.data().studentId === id);
}

window.addStudentBtn.onclick = async () => {
  const id = studentId.value.trim();

  if (await idExists(id)) return alert("Student ID exists");

  try {
    const userCred = await createUserWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value.trim()
    );

    await setDoc(doc(db, "students", id), {
      uid: userCred.user.uid,
      name: name.value,
      email: email.value,
      studentId: id,
      age: age.value,
      grade: grade.value,
      class: classInput.value
    });

    loadStudents();
    alert("Student added");
  } catch (e) {
    alert(e.message);
  }
};

window.updateStudentBtn.onclick = async () => {
  if (!sEdit) return alert("Select student");

  await updateDoc(doc(db, "students", sEdit), {
    name: name.value,
    email: email.value,
    studentId: studentId.value,
    age: age.value,
    grade: grade.value,
    class: classInput.value
  });

  loadStudents();
  sEdit = null;
};

/* =========================
   LOAD STUDENTS
========================= */
async function loadStudents() {
  studentTable.innerHTML = "";

  const snap = await getDocs(collection(db, "students"));

  document.getElementById("totalStudents").innerText = snap.size;

  snap.forEach(d => {
    const s = d.data();

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${s.name}</td>
      <td>${s.email}</td>
      <td>${s.studentId}</td>
      <td>${s.age}</td>
      <td>${s.grade}</td>
      <td>${s.class}</td>
      <td></td>
    `;

    const action = row.children[6];

    const edit = document.createElement("button");
    edit.className = "edit";
    edit.textContent = "Edit";
    edit.onclick = () => {
      sEdit = d.id;
      name.value = s.name;
      email.value = s.email;
      studentId.value = s.studentId;
      age.value = s.age;
      grade.value = s.grade;
      classInput.value = s.class;
    };

    const del = document.createElement("button");
    del.className = "delete";
    del.textContent = "Delete";
    del.onclick = async () => {
      await deleteDoc(doc(db, "students", d.id));
      loadStudents();
    };

    action.appendChild(edit);
    action.appendChild(del);

    studentTable.appendChild(row);
  });
}

/* =========================
   RESULTS
========================= */

window.addResultBtn.onclick = async () => {
  await setDoc(doc(db, "marks",
  r_studentId.value + "_" + subject.value + "_" + term.value
), {
  studentId: r_studentId.value,
  subject: subject.value,
  term: term.value,
  mark: mark.value
});

  loadResults();
};

async function loadResults() {
  resultsTable.innerHTML = "";

  const snap = await getDocs(collection(db, "marks"));

  document.getElementById("totalResults").innerText = snap.size;

  snap.forEach(d => {
    const r = d.data();

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${r.studentId}</td>
      <td>${r.subject}</td>
      <td>${r.term}</td>
      <td>${r.mark}</td>
      <td></td>
    `;

    const action = row.children[4];

    // EDIT BUTTON
    const edit = document.createElement("button");
    edit.className = "edit";
    edit.textContent = "Edit";

    edit.onclick = () => {
      rEdit = d.id;

      r_studentId.value = r.studentId;
      subject.value = r.subject;
      term.value = r.term;
      mark.value = r.mark;
    };

    // DELETE BUTTON
    const del = document.createElement("button");
    del.className = "delete";
    del.textContent = "Delete";

    del.onclick = async () => {
      if (!confirm("Delete this result?")) return;

      await deleteDoc(doc(db, "marks", d.id));
      loadResults();
    };

    action.appendChild(edit);
    action.appendChild(del);

    resultsTable.appendChild(row);
  });
}

/* =========================
   FEES
========================= */

window.addFeesBtn.onclick = async () => {

  const t = Number(total.value) || 0;
  const p = Number(paid.value) || 0;

  await setDoc(doc(db, "fees", f_studentId.value), {
    studentId: f_studentId.value,
    totalFees: t,
    amountPaid: p,
    balance: t - p
  });

  loadFees();
};

window.updateFeesBtn.onclick = async () => {

  if (!fEdit) return alert("Select fees record");

  const t = Number(total.value) || 0;
  const p = Number(paid.value) || 0;

  await updateDoc(doc(db, "fees", fEdit), {
    studentId: f_studentId.value,
    totalFees: t,
    amountPaid: p,
    balance: t - p
  });

  fEdit = null;

  loadFees();
};

async function loadFees() {

  feesTable.innerHTML = "";

  const snap = await getDocs(collection(db, "fees"));

  document.getElementById("totalFees").innerText = snap.size;

  snap.forEach(d => {

    const f = d.data();

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${f.studentId}</td>
      <td>${f.totalFees}</td>
      <td>${f.amountPaid}</td>
      <td>${f.balance}</td>
      <td></td>
    `;

    const action = row.children[4];

    const edit = document.createElement("button");

    edit.className = "edit";
    edit.textContent = "Edit";

    edit.onclick = () => {

      fEdit = d.id;

      f_studentId.value = f.studentId;
      total.value = f.totalFees;
      paid.value = f.amountPaid;
    };

    const del = document.createElement("button");

    del.className = "delete";
    del.textContent = "Delete";

    del.onclick = async () => {

      await deleteDoc(doc(db, "fees", d.id));

      loadFees();
    };

    action.appendChild(edit);
    action.appendChild(del);

    feesTable.appendChild(row);
  });
}
    

  /* LOGOUT */
window.logoutAdmin = async () => {

  try {

    await signOut(auth);

    loginGate.style.display = "flex";

    document.querySelectorAll(".section").forEach(section => {
      section.style.display = "none";
    });

  } catch (err) {

    alert("Logout failed: " + err.message);

  }
};             

showSection("home");
</script>

</body>
</html>
