<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body { font-family: Arial; background:#eef2f7; padding:20px; }
    h2 { text-align:center; }

    .section {
      background:white;
      padding:15px;
      margin:15px auto;
      max-width:1000px;
      border-radius:10px;
    }

    input { width:100%; padding:8px; margin:5px 0; }

    button { padding:8px; margin:3px; border:none; cursor:pointer; }

    .add { background:#007bff; color:white; }
    .update { background:green; color:white; }
    .delete { background:red; color:white; }
    .edit { background:orange; color:white; }

    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th { background:#007bff; color:white; padding:10px; }
    td { padding:8px; text-align:center; }
    tr:nth-child(even){ background:#f2f2f2; }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<!-- ================= STUDENTS ================= -->
<div class="section">
<h3>Students</h3>

<input id="name" placeholder="Name">
<input id="studentId" placeholder="Student ID">
<input id="password" placeholder="Password">
<input id="age" placeholder="Age">
<input id="grade" placeholder="Grade">
<input id="className" placeholder="Class">

<button id="addStudent" class="add">Add</button>
<button id="updateStudent" class="update">Update</button>

<table>
<thead>
<tr><th>Name</th><th>ID</th><th>Age</th><th>Grade</th><th>Class</th><th>Action</th></tr>
</thead>
<tbody id="studentTable"></tbody>
</table>
</div>

<!-- ================= RESULTS ================= -->
<div class="section">
<h3>Results</h3>

<input id="r_studentId" placeholder="Student ID">
<input id="subject" placeholder="Subject">
<input id="term" placeholder="Term">
<input id="mark" placeholder="Mark">

<button id="addResult" class="add">Add</button>

<table>
<thead>
<tr><th>ID</th><th>Subject</th><th>Term</th><th>Mark</th><th>Action</th></tr>
</thead>
<tbody id="resultsTable"></tbody>
</table>
</div>

<!-- ================= FEES ================= -->
<div class="section">
<h3>Fees</h3>

<input id="f_studentId" placeholder="Student ID">
<input id="total" placeholder="Total Fees">
<input id="paid" placeholder="Paid">

<button id="addFees" class="add">Add</button>

<table>
<thead>
<tr><th>ID</th><th>Total</th><th>Paid</th><th>Balance</th><th>Action</th></tr>
</thead>
<tbody id="feesTable"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDocs, collection,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STUDENTS ================= */

// 🔥 NO DUPLICATES (studentId is document ID)
document.getElementById("addStudent").onclick = async () => {

  const id = document.getElementById("studentId").value;

  try {
    await setDoc(doc(db, "students", id), {
      name: document.getElementById("name").value,
      studentId: id,
      password: document.getElementById("password").value,
      age: document.getElementById("age").value,
      grade: document.getElementById("grade").value,
      class: document.getElementById("className").value
    });

    alert("Saved (No duplicates allowed)");
    loadStudents();

  } catch (e) {
    alert("Error");
  }
};

async function loadStudents(){
  const table = document.getElementById("studentTable");
  table.innerHTML="";

  const snap = await getDocs(collection(db,"students"));

  snap.forEach(d=>{
    const s = d.data();

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${s.name}</td>
      <td>${s.studentId}</td>
      <td>${s.age}</td>
      <td>${s.grade}</td>
      <td>${s.class}</td>
      <td>
        <button onclick="deleteStudent('${d.id}')">Delete</button>
      </td>
    `;

    table.appendChild(row);
  });
}

window.deleteStudent = async (id)=>{
  await deleteDoc(doc(db,"students",id));
  loadStudents();
};

/* ================= RESULTS ================= */

document.getElementById("addResult").onclick = async ()=>{
  await setDoc(doc(db,"results", Date.now().toString()), {
    studentId: document.getElementById("r_studentId").value,
    subject: document.getElementById("subject").value,
    term: document.getElementById("term").value,
    mark: document.getElementById("mark").value
  });
  loadResults();
};

async function loadResults(){
  const table=document.getElementById("resultsTable");
  table.innerHTML="";

  const snap=await getDocs(collection(db,"results"));
  snap.forEach(d=>{
    const r=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${r.studentId}</td>
      <td>${r.subject}</td>
      <td>${r.term}</td>
      <td>${r.mark}</td>
      <td><button onclick="deleteResult('${d.id}')">Delete</button></td>
    `;
    table.appendChild(row);
  });
}

window.deleteResult = async (id)=>{
  await deleteDoc(doc(db,"results",id));
  loadResults();
};

/* ================= FEES ================= */

document.getElementById("addFees").onclick = async ()=>{
  let total=Number(document.getElementById("total").value);
  let paid=Number(document.getElementById("paid").value);

  await setDoc(doc(db,"fees", Date.now().toString()), {
    studentId: document.getElementById("f_studentId").value,
    totalFees: total,
    amountPaid: paid,
    balance: total-paid
  });

  loadFees();
};

async function loadFees(){
  const table=document.getElementById("feesTable");
  table.innerHTML="";

  const snap=await getDocs(collection(db,"fees"));
  snap.forEach(d=>{
    const f=d.data();

    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${f.studentId}</td>
      <td>${f.totalFees}</td>
      <td>${f.amountPaid}</td>
      <td>${f.balance}</td>
      <td><button onclick="deleteFees('${d.id}')">Delete</button></td>
    `;
    table.appendChild(row);
  });
}

window.deleteFees = async (id)=>{
  await deleteDoc(doc(db,"fees",id));
  loadFees();
};

/* INIT */
loadStudents();
loadResults();
loadFees();

</script>

</body>
</html>
