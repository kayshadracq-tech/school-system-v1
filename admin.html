<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<!-- NAVIGATION -->
<a href="index.html">Home</a> |
<a href="student.html">Student Portal</a>

<hr>

<!-- ================= STUDENTS ================= -->
<h3>Add Student</h3>

<input id="name" placeholder="Student name"><br><br>
<input id="studentId" placeholder="Student ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<input id="age" placeholder="Age"><br><br>
<input id="grade" placeholder="Grade"><br><br>
<input id="class" placeholder="Class"><br><br>

<button onclick="addStudent()">Add Student</button>

<ul id="studentList"></ul>

<hr>

<!-- ================= RESULTS ================= -->
<h3>Results</h3>

<input id="r_studentId" placeholder="Student ID"><br><br>
<input id="subject" placeholder="Subject"><br><br>
<input id="term" placeholder="Term"><br><br>
<input id="mark" placeholder="Mark"><br><br>

<button onclick="addResult()">Add Result</button>

<ul id="resultsList"></ul>

<hr>

<!-- ================= FEES ================= -->
<h3>Fees</h3>

<input id="f_studentId" placeholder="Student ID"><br><br>
<input id="total" placeholder="Total fees"><br><br>
<input id="paid" placeholder="Paid"><br><br>

<button onclick="addFees()">Add Fees</button>

<ul id="feesList"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STUDENT ================= */
window.addStudent = async function () {
  try {
    const name = document.getElementById("name").value;
    const studentId = document.getElementById("studentId").value;
    const password = document.getElementById("password").value;
    const age = document.getElementById("age").value;
    const grade = document.getElementById("grade").value;
    const studentClass = document.getElementById("class").value;

    await addDoc(collection(db, "students"), {
      name,
      studentId,
      password,
      age,
      grade,
      class: studentClass
    });

    alert("Student saved successfully!");

    // clear form
    document.getElementById("name").value = "";
    document.getElementById("studentId").value = "";
    document.getElementById("password").value = "";
    document.getElementById("age").value = "";
    document.getElementById("grade").value = "";
    document.getElementById("class").value = "";

  } catch (error) {
    console.error(error);
    alert("Error saving student");
  }
};

/* ================= RESULTS ================= */
window.addResult = async function () {
  try {
    await addDoc(collection(db, "results"), {
      studentId: document.getElementById("r_studentId").value,
      subject: document.getElementById("subject").value,
      term: document.getElementById("term").value,
      mark: document.getElementById("mark").value
    });

    alert("Result saved successfully!");

  } catch (error) {
    console.error(error);
    alert("Error saving result");
  }
};

/* ================= FEES ================= */
window.addFees = async function () {
  try {
    const totalVal = Number(document.getElementById("total").value);
    const paidVal = Number(document.getElementById("paid").value);

    await addDoc(collection(db, "fees"), {
      studentId: document.getElementById("f_studentId").value,
      totalFees: totalVal,
      amountPaid: paidVal,
      balance: totalVal - paidVal
    });

    alert("Fees saved successfully!");

  } catch (error) {
    console.error(error);
    alert("Error saving fees");
  }
};
</script>

</body>
</html>
