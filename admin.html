<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6fb;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    a {
      margin-right: 10px;
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
    }

    /* DASHBOARD CARDS */
    .stats {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      width: 150px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin: 10px;
    }

    .card h3 {
      margin: 5px 0;
      color: #333;
    }

    /* SECTIONS */
    .section {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<a href="index.html">Home</a> |
<a href="student.html">Student Portal</a>

<!-- ================= STATS ================= -->
<div class="stats">
  <div class="card">
    <h3 id="totalStudents">0</h3>
    <p>Students</p>
  </div>

  <div class="card">
    <h3 id="totalResults">0</h3>
    <p>Results</p>
  </div>

  <div class="card">
    <h3 id="totalFees">0</h3>
    <p>Fees Records</p>
  </div>
</div>

<!-- ================= STUDENTS ================= -->
<div class="section">
  <h3>Add Student</h3>

  <input id="name" placeholder="Student name">
  <input id="studentId" placeholder="Student ID">
  <input id="password" type="password" placeholder="Password">
  <input id="age" placeholder="Age">
  <input id="grade" placeholder="Grade">
  <input id="class" placeholder="Class">

  <button onclick="addStudent()">Add Student</button>

  <ul id="studentList"></ul>
</div>

<!-- ================= RESULTS ================= -->
<div class="section">
  <h3>Results</h3>

  <input id="r_studentId" placeholder="Student ID">
  <input id="subject" placeholder="Subject">
  <input id="term" placeholder="Term">
  <input id="mark" placeholder="Mark">

  <button onclick="addResult()">Add Result</button>

  <ul id="resultsList"></ul>
</div>

<!-- ================= FEES ================= -->
<div class="section">
  <h3>Fees</h3>

  <input id="f_studentId" placeholder="Student ID">
  <input id="total" placeholder="Total fees">
  <input id="paid" placeholder="Paid">

  <button onclick="addFees()">Add Fees</button>

  <ul id="feesList"></ul>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STUDENT ================= */
window.addStudent = async function () {

  await addDoc(collection(db, "students"), {
    name: name.value,
    studentId: studentId.value,
    password: password.value,
    age: age.value,
    grade: grade.value,
    class: class.value
  });

  alert("Student added");

  loadStudents();
  updateStats();

  name.value = "";
  studentId.value = "";
  password.value = "";
  age.value = "";
  grade.value = "";
  class.value = "";
};

/* ================= RESULT ================= */
window.addResult = async function () {

  await addDoc(collection(db, "results"), {
    studentId: r_studentId.value,
    subject: subject.value,
    term: term.value,
    mark: mark.value
  });

  alert("Result added");

  loadResults();
  updateStats();
};

/* ================= FEES ================= */
window.addFees = async function () {

  const totalVal = Number(total.value);
  const paidVal = Number(paid.value);

  await addDoc(collection(db, "fees"), {
    studentId: f_studentId.value,
    totalFees: totalVal,
    amountPaid: paidVal,
    balance: totalVal - paidVal
  });

  alert("Fees added");

  loadFees();
  updateStats();
};

/* ================= LOAD DATA ================= */

async function loadStudents() {
  studentList.innerHTML = "";
  const snap = await getDocs(collection(db, "students"));

  snap.forEach(doc => {
    const s = doc.data();
    studentList.innerHTML += `<li>${s.name} (${s.studentId})</li>`;
  });
}

async function loadResults() {
  resultsList.innerHTML = "";
  const snap = await getDocs(collection(db, "results"));

  snap.forEach(doc => {
    const r = doc.data();
    resultsList.innerHTML += `<li>${r.studentId} - ${r.subject} - ${r.mark}</li>`;
  });
}

async function loadFees() {
  feesList.innerHTML = "";
  const snap = await getDocs(collection(db, "fees"));

  snap.forEach(doc => {
    const f = doc.data();
    feesList.innerHTML += `<li>${f.studentId} - Balance: ${f.balance}</li>`;
  });
}

/* ================= STATS ================= */

async function updateStats() {

  const studentsSnap = await getDocs(collection(db, "students"));
  const resultsSnap = await getDocs(collection(db, "results"));
  const feesSnap = await getDocs(collection(db, "fees"));

  document.getElementById("totalStudents").innerText = studentsSnap.size;
  document.getElementById("totalResults").innerText = resultsSnap.size;
  document.getElementById("totalFees").innerText = feesSnap.size;
}

/* INIT */
loadStudents();
loadResults();
loadFees();
updateStats();

</script>

</body>
</html>
