<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<!-- NAVIGATION -->
<a href="index.html">Home</a> |
<a href="student.html">Student Portal</a>

<hr>

<!-- ================= STUDENTS ================= -->
<h3>Add Student</h3>

<input id="name" placeholder="Student name"><br><br>
<input id="studentId" placeholder="Student ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<input id="age" placeholder="Age"><br><br>
<input id="grade" placeholder="Grade"><br><br>
<input id="class" placeholder="Class"><br><br>

<button onclick="addStudent()">Add Student</button>

<ul id="studentList"></ul>

<hr>

<!-- ================= RESULTS ================= -->
<h3>Results</h3>

<input id="r_studentId" placeholder="Student ID"><br><br>
<input id="subject" placeholder="Subject"><br><br>
<input id="term" placeholder="Term"><br><br>
<input id="mark" placeholder="Mark"><br><br>

<button onclick="addResult()">Add Result</button>

<ul id="resultsList"></ul>

<hr>

<!-- ================= FEES ================= -->
<h3>Fees</h3>

<input id="f_studentId" placeholder="Student ID"><br><br>
<input id="total" placeholder="Total fees"><br><br>
<input id="paid" placeholder="Paid"><br><br>

<button onclick="addFees()">Add Fees</button>

<ul id="feesList"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STUDENT SAVE ================= */
window.addStudent = async function () {
  try {
    await addDoc(collection(db, "students"), {
      name: name.value,
      studentId: studentId.value,
      password: password.value,
      age: age.value,
      grade: grade.value,
      class: class.value
    });

    alert("Student saved successfully!");

    loadStudents();

    name.value = "";
    studentId.value = "";
    password.value = "";
    age.value = "";
    grade.value = "";
    class.value = "";

  } catch (error) {
    console.error(error);
    alert("Error saving student");
  }
};

/* ================= RESULT SAVE ================= */
window.addResult = async function () {
  try {
    await addDoc(collection(db, "results"), {
      studentId: r_studentId.value,
      subject: subject.value,
      term: term.value,
      mark: mark.value
    });

    alert("Result saved successfully!");

    loadResults();

  } catch (error) {
    console.error(error);
    alert("Error saving result");
  }
};

/* ================= FEES SAVE ================= */
window.addFees = async function () {
  try {
    const totalVal = Number(total.value);
    const paidVal = Number(paid.value);

    await addDoc(collection(db, "fees"), {
      studentId: f_studentId.value,
      totalFees: totalVal,
      amountPaid: paidVal,
      balance: totalVal - paidVal
    });

    alert("Fees saved successfully!");

    loadFees();

  } catch (error) {
    console.error(error);
    alert("Error saving fees");
  }
};

/* ================= LOAD DATA (NEW PART) ================= */

async function loadStudents() {
  studentList.innerHTML = "";
  const snap = await getDocs(collection(db, "students"));

  snap.forEach(doc => {
    const s = doc.data();
    const li = document.createElement("li");
    li.textContent = `${s.name} | ${s.studentId} | ${s.grade}`;
    studentList.appendChild(li);
  });
}

async function loadResults() {
  resultsList.innerHTML = "";
  const snap = await getDocs(collection(db, "results"));

  snap.forEach(doc => {
    const r = doc.data();
    const li = document.createElement("li");
    li.textContent = `${r.studentId} | ${r.subject} | ${r.mark}`;
    resultsList.appendChild(li);
  });
}

async function loadFees() {
  feesList.innerHTML = "";
  const snap = await getDocs(collection(db, "fees"));

  snap.forEach(doc => {
    const f = doc.data();
    const li = document.createElement("li");
    li.textContent = `${f.studentId} | Balance: ${f.balance}`;
    feesList.appendChild(li);
  });
}

/* RUN ON PAGE LOAD */
loadStudents();
loadResults();
loadFees();

</script>

</body>
</html>
