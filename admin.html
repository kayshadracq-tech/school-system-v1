<!DOCTYPE html>
<html>
<head>
  <title>Admin - School System</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<!-- ================= STUDENTS ================= -->
<h3>Add Student</h3>

<input id="name" placeholder="Student name"><br><br>
<input id="studentId" placeholder="Student ID"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<input id="age" placeholder="Age"><br><br>
<input id="grade" placeholder="Grade"><br><br>
<input id="class" placeholder="Class"><br><br>

<button onclick="addStudent()">Add Student</button>

<ul id="studentList"></ul>

<hr>

<!-- ================= RESULTS ================= -->
<h3>Add Results</h3>

<input id="r_name" placeholder="Student name"><br><br>
<input id="subject" placeholder="Subject"><br><br>
<input id="term" placeholder="Term (1,2,3)"><br><br>
<input id="mark" placeholder="Mark"><br><br>

<button onclick="addResult()">Add Result</button>

<ul id="resultsList"></ul>

<hr>

<!-- ================= FEES ================= -->
<h3>Fees Management</h3>

<input id="f_name" placeholder="Student name"><br><br>
<input id="total" placeholder="Total fees"><br><br>
<input id="paid" placeholder="Amount paid"><br><br>

<button onclick="addFees()">Add Fees</button>

<ul id="feesList"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARjhhYGo-_QUisiYa5AfUVqoJ3cHgLZM0",
  authDomain: "school-system-748cf.firebaseapp.com",
  projectId: "school-system-748cf",
  storageBucket: "school-system-748cf.firebasestorage.app",
  messagingSenderId: "899412742738",
  appId: "1:899412742738:web:7dc83a50b53789b196858b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const studentList = document.getElementById("studentList");
const resultsList = document.getElementById("resultsList");
const feesList = document.getElementById("feesList");


// ================= STUDENTS =================
window.addStudent = async function () {
  const name = document.getElementById("name").value;
  const studentId = document.getElementById("studentId").value;
  const password = document.getElementById("password").value;
  const age = document.getElementById("age").value;
  const grade = document.getElementById("grade").value;
  const studentClass = document.getElementById("class").value;

  if (!name || !studentId || !password) {
    alert("Fill required fields");
    return;
  }

  await addDoc(collection(db, "students"), {
    name,
    studentId,
    password,
    age,
    grade,
    class: studentClass
  });

  loadStudents();
};


// ================= LOAD STUDENTS =================
async function loadStudents() {
  studentList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "students"));

  snapshot.forEach((doc) => {
    const s = doc.data();

    const li = document.createElement("li");
    li.textContent =
      s.name +
      " | ID: " + s.studentId +
      " | Grade: " + s.grade;

    studentList.appendChild(li);
  });
}


// ================= RESULTS =================
window.addResult = async function () {
  const name = document.getElementById("r_name").value;
  const subject = document.getElementById("subject").value;
  const term = document.getElementById("term").value;
  const mark = document.getElementById("mark").value;

  if (!name || !subject || !term || !mark) return;

  await addDoc(collection(db, "results"), {
    studentName: name,
    subject,
    term,
    mark: Number(mark)
  });

  loadResults();
};


// ================= LOAD RESULTS =================
async function loadResults() {
  resultsList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "results"));

  snapshot.forEach((doc) => {
    const r = doc.data();

    const li = document.createElement("li");
    li.textContent =
      r.studentName +
      " | " + r.subject +
      " | Term " + r.term +
      " | " + r.mark;

    resultsList.appendChild(li);
  });
}


// ================= FEES =================
window.addFees = async function () {
  const name = document.getElementById("f_name").value;
  const total = Number(document.getElementById("total").value);
  const paid = Number(document.getElementById("paid").value);

  if (!name || !total || !paid) return;

  const balance = total - paid;

  await addDoc(collection(db, "fees"), {
    studentName: name,
    totalFees: total,
    amountPaid: paid,
    balance
  });

  loadFees();
};


// ================= LOAD FEES =================
