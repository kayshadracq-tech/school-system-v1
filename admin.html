<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .section {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 10px;
    }

    button:hover {
      background: #218838;
    }

    a {
      margin-right: 10px;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<a href="index.html">Home</a> |
<a href="student.html">Student Portal</a>

<div class="section">
  <h3>Add Student</h3>
  <input id="name" placeholder="Name">
  <input id="studentId" placeholder="Student ID">
  <input id="password" type="password" placeholder="Password">
  <input id="age" placeholder="Age">
  <input id="grade" placeholder="Grade">
  <input id="class" placeholder="Class">
  <button onclick="addStudent()">Add Student</button>
  <ul id="studentList"></ul>
</div>

<div class="section">
  <h3>Add Result</h3>
  <input id="r_studentId" placeholder="Student ID">
  <input id="subject" placeholder="Subject">
  <input id="term" placeholder="Term">
  <input id="mark" placeholder="Mark">
  <button onclick="addResult()">Add Result</button>
  <ul id="resultsList"></ul>
</div>

<div class="section">
  <h3>Add Fees</h3>
  <input id="f_studentId" placeholder="Student ID">
  <input id="total" placeholder="Total Fees">
  <input id="paid" placeholder="Paid">
  <button onclick="addFees()">Add Fees</button>
  <ul id="feesList"></ul>
</div>

<!-- KEEP YOUR FIREBASE SCRIPT EXACTLY SAME -->
<script type="module">
/* (your existing Firebase logic stays unchanged) */
</script>

</body>
</html>
